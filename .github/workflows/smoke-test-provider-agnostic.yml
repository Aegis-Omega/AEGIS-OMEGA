name: Smoke Test — Provider-Agnostic Bridge Health

# Runs on every push to ensure bridge startup works across all platforms
# (Windows, macOS, Linux, Docker, WSL). Detects platform issues early.
#
# Platforms tested:
#   - ubuntu-latest (Linux native)
#   - macos-latest (macOS)
#   - windows-latest (Windows native)
#
# Environment variables injected:
#   - PLATFORM_CONTEXT: auto-set by platform-bootstrap.py
#   - BRIDGE_LOG_DIR: temp directory for bridge logs

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'sovereign-omega-v2/python/**'
      - '.claude/skills/run-aegis/**'
      - '.github/workflows/smoke-test-provider-agnostic.yml'
      - 'scripts/platform-bootstrap.py'
  pull_request:
    branches:
      - main

concurrency:
  group: smoke-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install bridge dependencies
        run: |
          python -m pip install --upgrade pip
          cd sovereign-omega-v2
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        shell: bash

      - name: Set up bridge log directory
        run: |
          mkdir -p /tmp/bridge-logs
          echo "BRIDGE_LOG_DIR=/tmp/bridge-logs" >> $GITHUB_ENV
        shell: bash
        if: runner.os != 'Windows'

      - name: Set up bridge log directory (Windows)
        run: |
          mkdir -Force "$env:TEMP\bridge-logs"
          "BRIDGE_LOG_DIR=$env:TEMP\bridge-logs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh
        if: runner.os == 'Windows'

      - name: Display platform context
        run: |
          python scripts/platform-bootstrap.py --help
          echo "---"
          python -c "from scripts.platform_bootstrap import PlatformContext; ctx = PlatformContext(); print(f'Environment: {ctx.environment_name}\nSystem: {ctx.system}\nPython: {ctx.python_version}')"
        shell: bash

      - name: Run platform bootstrap + bridge startup
        run: |
          python scripts/platform-bootstrap.py \
            --host 127.0.0.1 \
            --port 7890 \
            --timeout 30 \
            --repo-root $PWD
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/sovereign-omega-v2/python:${{ env.PYTHONPATH }}

      - name: Run smoke driver (if available)
        run: |
          if [ -f .claude/skills/run-aegis/driver.cjs ]; then
            echo "Running smoke driver..."
            node .claude/skills/run-aegis/driver.cjs
          else
            echo "Smoke driver not found; bootstrap-only validation passed."
          fi
        shell: bash
        continue-on-error: true

      - name: Collect bridge logs
        if: always()
        run: |
          echo "Bridge logs from $BRIDGE_LOG_DIR:"
          if [ -d "$BRIDGE_LOG_DIR" ]; then
            ls -la "$BRIDGE_LOG_DIR" || true
            cat "$BRIDGE_LOG_DIR"/* || true
          fi
        shell: bash
        if: runner.os != 'Windows'

      - name: Collect bridge logs (Windows)
        if: always()
        run: |
          "Bridge logs from $env:BRIDGE_LOG_DIR:"
          if (Test-Path "$env:BRIDGE_LOG_DIR") {
            Get-ChildItem "$env:BRIDGE_LOG_DIR" | ForEach-Object { Get-Content $_.FullName }
          }
        shell: pwsh
        if: runner.os == 'Windows'

      - name: Report status
        if: always()
        run: |
          echo "✓ Smoke test completed on ${{ matrix.os }}"
          echo "Platform context: ${{ env.PLATFORM_CONTEXT }}"
        shell: bash

  summary:
    name: Smoke Test Summary
    runs-on: ubuntu-latest
    needs: smoke-test
    if: always()

    steps:
      - name: Check smoke test results
        run: |
          if [ "${{ needs.smoke-test.result }}" == "success" ]; then
            echo "✓ All smoke tests passed"
            exit 0
          else
            echo "✗ Some smoke tests failed"
            exit 1
          fi
