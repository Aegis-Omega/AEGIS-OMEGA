name: One-shot Scale OS Control Plane Bootstrap

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/bootstrap_scale_os_control_plane.py
      - scripts/patch_scale_os_control_plane.py
      - .github/workflows/one-shot-scale-os-control-plane.yml

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout bounded branch
        uses: actions/checkout@v4
        with:
          ref: agent/scale-os-control-plane-v1
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sovereign-omega-v2/package-lock.json

      - name: Materialize signed control-plane patch
        run: |
          python3 scripts/bootstrap_scale_os_control_plane.py
          python3 scripts/patch_scale_os_control_plane.py

      - name: Install exact dependencies
        working-directory: sovereign-omega-v2
        run: npm ci

      - name: Run signed control-plane tests
        working-directory: sovereign-omega-v2
        run: npx vitest run test/unit/scale-os-control-plane.test.ts

      - name: Typecheck repository contracts
        id: typecheck
        continue-on-error: true
        working-directory: sovereign-omega-v2
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee "$RUNNER_TEMP/scale-os-typecheck.log"

      - name: Upload typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: scale-os-typecheck-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/scale-os-typecheck.log
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed after typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Verify migration and patch hygiene
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'scale_os_event_envelopes_v1' supabase/migrations/20260719033000_scale_os_control_plane_v1.sql
          grep -q 'enable row level security' supabase/migrations/20260719033000_scale_os_control_plane_v1.sql
          git diff --check

      - name: Commit validated implementation
        shell: bash
        run: |
          set -euo pipefail
          rm scripts/bootstrap_scale_os_control_plane.py
          rm scripts/patch_scale_os_control_plane.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(scale-os): add signed control-plane events v1'
          git push origin HEAD:agent/scale-os-control-plane-v1
