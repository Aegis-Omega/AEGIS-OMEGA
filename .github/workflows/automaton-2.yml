name: AEGIS Automaton-2

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  automaton-2:
    name: aegis / automaton-2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install exact validator dependency
        run: pip install jsonschema==4.23.0

      - name: Resolve parent cognitive state
        id: parent
        shell: bash
        run: |
          set -euo pipefail
          parent="${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}"
          if [[ -z "$parent" || "$parent" =~ ^0+$ ]]; then
            parent="$(git rev-parse "${CANDIDATE_SHA}^")"
          fi
          parent_manifest="$RUNNER_TEMP/PARENT_CLAUDE.json"
          if git show "$parent:.claude.json" > "$parent_manifest" 2>/dev/null; then
            echo "manifest=$parent_manifest" >> "$GITHUB_OUTPUT"
          else
            rm -f "$parent_manifest"
            echo "manifest=" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=$parent" >> "$GITHUB_OUTPUT"

      - name: Run Automaton-2 negative and determinism tests
        run: python sovereign-omega-v2/python/tests/test_automaton2.py

      - name: Validate candidate and emit receipt
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/AUTOMATON2_RECEIPT.json"
          parent_args=()
          if [[ -n "${{ steps.parent.outputs.manifest }}" ]]; then
            parent_args=(--parent-manifest "${{ steps.parent.outputs.manifest }}")
          else
            parent_args=(--expected-parent-state-hash "$(printf '0%.0s' {1..64})")
          fi
          python scripts/validate-automaton2.py \
            --candidate-sha "$CANDIDATE_SHA" \
            --require-oidc \
            --output "$out" \
            "${parent_args[@]}"

      - name: Upload Automaton-2 receipt
        uses: actions/upload-artifact@v4
        with:
          name: aegis-automaton-2-${{ env.CANDIDATE_SHA }}
          path: ${{ runner.temp }}/AUTOMATON2_RECEIPT.json
          if-no-files-found: error
          retention-days: 90

      - name: Attest governed cognitive transition
        uses: actions/attest@v4
        with:
          subject-path: |
            .claude.json
            skill-hashes.sha256
            ${{ runner.temp }}/AUTOMATON2_RECEIPT.json
