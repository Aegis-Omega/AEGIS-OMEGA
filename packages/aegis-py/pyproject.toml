[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aegis-omega"
version = "1.0.0"
description = "AEGIS-Ω Python SDK — governed multi-agent AI with constitutional audit trail"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Tarik Skalić", email = "info@aegisomega.com" }]
keywords = ["ai", "governance", "audit", "eu-ai-act", "multi-agent", "constitutional"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries",
]
dependencies = []

[project.optional-dependencies]
async = ["aiohttp>=3.9"]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "aiohttp>=3.9"]

[project.urls]
Homepage = "https://aegisomega.com/platform"
Documentation = "https://aegis-vertex.aegisomega.com/docs"
Repository = "https://github.com/aegis-omega/aegis--"

[project.scripts]
aegis = "aegis.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["aegis"]
