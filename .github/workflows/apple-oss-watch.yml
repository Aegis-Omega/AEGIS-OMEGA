# Apple OSS Watch
#
# Daily check of upstream Apple open-source releases/tags against the recorded
# state in reports/apple-oss-state.json. When something new is published, it
# opens an issue listing current vs recorded versions.
#
# Deliberately does NOT commit updated state from CI (no bot-commit loops):
# a maintainer acknowledges a release by editing reports/apple-oss-state.json.
# Until the state file is updated, the check re-reports on its next run (the
# issue title carries the date, so at most one issue per day).
#
# Each upstream check tolerates failure (missing release, API hiccup) — a repo
# that can't be queried is skipped, never fails the job.

name: Apple OSS Watch

on:
  schedule:
    - cron: '17 5 * * *'   # daily, 05:17 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare upstream versions against recorded state
        id: check
        continue-on-error: true   # a watch failure must never look like a CI failure
        env:
          GH_TOKEN: ${{ github.token }}
          STATE: reports/apple-oss-state.json
        run: |
          set -u
          BODY=/tmp/apple-oss-body.md
          CHANGED=0
          {
            echo "Upstream Apple OSS versions differ from the recorded state (\`$STATE\`)."
            echo ""
            echo "| Repository | Recorded | Current |"
            echo "|------------|----------|---------|"
          } > "$BODY"

          # check <owner/repo> <kind: release|tag>
          check() {
            local repo="$1" kind="$2" current="" recorded=""
            if [ "$kind" = "release" ]; then
              current=$(gh api "repos/$repo/releases/latest" --jq '.tag_name' 2>/dev/null || true)
            else
              current=$(gh api "repos/$repo/tags?per_page=1" --jq '.[0].name' 2>/dev/null || true)
            fi
            if [ -z "$current" ] || [ "$current" = "null" ]; then
              echo "::warning::$repo — could not fetch latest $kind (skipped)"
              return 0
            fi
            recorded=$(jq -r --arg r "$repo" '.repos[$r].latest_known // "none recorded"' "$STATE")
            if [ "$current" != "$recorded" ]; then
              echo "| $repo | $recorded | **$current** |" >> "$BODY"
              CHANGED=1
            fi
          }

          check "apple-oss-distributions/distribution-macOS" tag
          check "apple-oss-distributions/xnu"                tag
          check "apple/swift"                                release
          check "apple/swift-syntax"                         release

          {
            echo ""
            echo "To acknowledge, update \`latest_known\` in \`$STATE\` (this workflow never commits)."
          } >> "$BODY"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Open issue listing new releases
        if: steps.check.outputs.changed == '1'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Apple OSS releases: $(date -u +%F)" \
            --body-file /tmp/apple-oss-body.md
