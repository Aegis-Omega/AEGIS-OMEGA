name: AEGIS Coordinator Authority

on:
  pull_request:
    paths:
      - "agents/**"
      - "harness/**"
      - "sovereign-omega-v2/python/tests/test_coordinator_authority.py"
      - ".github/workflows/coordinator-authority.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coordinator-authority-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  coordinator-authority:
    name: aegis / coordinator-authority
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install exact test dependencies
        run: python -m pip install --disable-pip-version-check pytest==8.4.1 httpx==0.28.1 redis==6.2.0 PyYAML==6.0.2

      - name: Run V2 registry authority tests
        run: pytest -q sovereign-omega-v2/python/tests/test_skill_authority.py

      - name: Run coordinator fail-closed tests
        run: pytest -q sovereign-omega-v2/python/tests/test_coordinator_authority.py
