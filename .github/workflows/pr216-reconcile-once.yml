name: PR 216 One-Time Reconciliation

on:
  push:
    branches:
      - claude/slack-session-yyw7h6

permissions:
  contents: write

jobs:
  replay-audited-files:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout reconciled branch
        uses: actions/checkout@v4
        with:
          ref: claude/slack-session-yyw7h6
          fetch-depth: 0

      - name: Replay exact audited PR 216 files
        shell: bash
        run: |
          set -euo pipefail
          archive_ref="archive/pr-216-pre-reconcile-07fcbc4"
          git fetch origin "$archive_ref" --no-tags
          for path in \
            docs/claims.json \
            docs/CLAIMS_LEDGER.md \
            docs/DISCOVERY_PORTFOLIO.md \
            sovereign-omega-v2/mcp-server/src/index.ts
          do
            git show "origin/${archive_ref}:${path}" > "$path"
          done

      - name: Remove one-time workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/pr216-reconcile-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/claims.json \
            docs/CLAIMS_LEDGER.md \
            docs/DISCOVERY_PORTFOLIO.md \
            sovereign-omega-v2/mcp-server/src/index.ts
          git commit -m "chore(pr216): replay audited claims and MCP resources"
          git push origin HEAD:claude/slack-session-yyw7h6
