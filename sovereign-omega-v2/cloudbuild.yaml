steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/aegis-vertex:latest
      # Build context = sovereign-omega-v2/ so python/ and dist/ land in the image
      - sovereign-omega-v2/

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, gcr.io/$PROJECT_ID/aegis-vertex:latest]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - aegis-vertex
      - --image=gcr.io/$PROJECT_ID/aegis-vertex:latest
      - --region=europe-west3
      - --platform=managed
      # anthropic-api-key powers live 39-agent swarm (platform_helpers.swarm_collaborate_live)
      # supabase-service-role-key gates /platform/* endpoints via verify_api_key()
      - --set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest
      - --set-env-vars=SUPABASE_URL=https://rwehltdwpsncnwxzkwik.supabase.co
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5

images:
  - gcr.io/$PROJECT_ID/aegis-vertex:latest

options:
  logging: CLOUD_LOGGING_ONLY
