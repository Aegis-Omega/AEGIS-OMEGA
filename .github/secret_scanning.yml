# GitHub secret-scanning exclusions.
#
# These paths legitimately contain HIGH-ENTROPY-LOOKING but NON-SECRET values:
#   - the golden-ratio constant φ = 0.6180339887 (the constitutional quorum/φ
#     threshold), used pervasively as a mathematical constant
#   - published SHA-256 *fingerprints* of frozen constitutional files and the
#     constitutional state hash (these are public integrity hashes, not credentials)
#   - the Supabase ANON key (a public, browser-shipped key protected by RLS)
#
# Excluding these stops false-positive alerts without weakening scanning of
# application source and configuration, where real credentials would appear.
paths-ignore:
  - "**/test/**"
  - "**/tests/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "*.md"
  - "**/*.md"
  - "docs/**"
  - "**/docs/**"
  - "**/*.env.example"
