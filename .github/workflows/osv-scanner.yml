# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Periodic OSV-Scanner scanning for vulnerabilities, plus a pull-request check
# that fails when a change introduces new known vulnerabilities.
#
# Upstream configuration reference:
# https://google.github.io/osv-scanner/github-action/

name: OSV-Scanner

on:
  pull_request:
    branches: [main, 'claude/*']
  merge_group:
    branches: [main, 'claude/*']
  schedule:
    - cron: '15 13 * * 6'
  push:
    branches: [main, 'claude/*']

permissions:
  # Required by the reusable workflow and SARIF upload path.
  actions: read
  security-events: write
  contents: read

jobs:
  scan-scheduled:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8"
    permissions:
      actions: read
      security-events: write
      contents: read
    with:
      scan-args: |-
        -r
        --skip-git
        ./

  scan-pr:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8"
    permissions:
      actions: read
      security-events: write
      contents: read
    with:
      scan-args: |-
        -r
        --skip-git
        ./
