name: AEGIS MCP Resources

on:
  pull_request:
    branches: [main]
    paths:
      - 'sovereign-omega-v2/mcp-server/**'
      - 'INDEX.md'
      - 'REPO_MAP.md'
      - '.github/workflows/mcp-resources.yml'
  merge_group:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'sovereign-omega-v2/mcp-server/**'
      - 'INDEX.md'
      - 'REPO_MAP.md'
      - '.github/workflows/mcp-resources.yml'

permissions:
  contents: read

jobs:
  mcp-resources:
    name: aegis / mcp-resources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sovereign-omega-v2/mcp-server/package-lock.json

      - name: Install locked dependencies
        working-directory: sovereign-omega-v2/mcp-server
        run: npm ci

      - name: Build and exercise key-free resources
        working-directory: sovereign-omega-v2/mcp-server
        shell: bash
        run: |
          set +e
          npm run test:resources > "$RUNNER_TEMP/mcp-resources.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/mcp-resources.log"
          exit "$status"

      - name: Upload MCP resource test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegis-mcp-resources-${{ github.sha }}
          path: ${{ runner.temp }}/mcp-resources.log
          if-no-files-found: error
          retention-days: 30
